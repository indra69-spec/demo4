apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo2-deployment
  labels:
    app: demo2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo2
  template:
    metadata:
      labels:
        app: demo2
    spec:
      containers:
        - name: demo2
          image: indrajit/demo2:latest
          ports:
            - containerPort: 8080
